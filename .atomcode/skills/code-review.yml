name: code-review
description: 对当前修改进行代码审查，产出审查报告
prompt: |
  对以下变更进行代码审查，按优先级输出问题清单：

  ## 审查范围
  {scope}

  ## 审查维度（按优先级排序）

  ### P0 — 正确性
  - [ ] 是否存在并发问题（竞态条件、线程安全）
  - [ ] 事务边界是否正确（@Transactional 是否加在正确位置）
  - [ ] 异常处理是否完整（是否捕获了不该捕获的异常，是否漏了异常）
  - [ ] 缓存一致性（读写缓存是否有遗漏）

  ### P1 — 安全性
  - [ ] 是否存在水平越权（用户A能否操作用户B的数据）
  - [ ] 输入校验是否充分（@Valid、@NotBlank、@NotNull）
  - [ ] SQL 注入风险（是否使用了字符串拼接）
  - [ ] 敏感信息泄露（密码、Token 是否被打印到日志）

  ### P2 — 可靠性
  - [ ] 空指针风险（getter 返回值是否可能为 null）
  - [ ] 资源泄漏（流是否关闭、连接是否释放）
  - [ ] 事务过大（@Transactional 是否包含了不需要事务的操作）

  ### P3 — 可维护性
  - [ ] 硬编码（magic number、magic string 是否应该提取为常量）
  - [ ] 方法过长（是否需要拆分）
  - [ ] 注释缺失（public 方法是否有 Javadoc）
  - [ ] 命名是否清晰（变量名、方法名能否自解释）

  ## 输出格式
  ```
  ## 审查报告

  ### P0 - 必须修复
  1. [问题描述] → 行号 → 修复建议

  ### P1 - 建议修复
  ...

  ### P2 - 值得关注
  ...
  ```