name: performance-review
description: 对代码进行性能审查，识别潜在性能瓶颈
prompt: |
  对以下代码进行性能审查，识别性能瓶颈和优化机会。

  ## 审查维度

  ### 1. 数据库查询
  - [ ] N+1 查询：是否在循环中查询数据库
  - [ ] 缺少分页：大数据量查询是否加了 LIMIT
  - [ ] 缺少索引：WHERE / ORDER BY / JOIN 字段是否有索引
  - [ ] 查询了不需要的字段：是否使用了 SELECT * 代替具体字段
  - [ ] 大事务：@Transactional 是否包含了不必要的操作（如 RPC 调用）

  ### 2. 循环与集合
  - [ ] 循环内创建对象：是否在循环中 new 对象，可以提到循环外
  - [ ] 循环内调用 RPC：是否在循环中调用远程接口
  - [ ] 集合选型不当：是否需要 HashMap 但用了 List，或需要有序但用了 HashSet
  - [ ] 频繁扩容：是否预先指定了 ArrayList / StringBuilder 的初始容量

  ### 3. 缓存
  - [ ] 热点数据未缓存：频繁查询的数据是否应该加缓存
  - [ ] 缓存失效风暴：大量缓存同时过期可能导致 DB 被打爆
  - [ ] 缓存穿透：查询不存在的数据是否做了空值缓存

  ### 4. 并发与锁
  - [ ] 锁粒度太粗：是否锁了比必要范围更大的代码块
  - [ ] 线程池配置不当：核心线程数、最大线程数、队列大小是否合理
  - [ ] 异步任务未处理异常：异步线程抛异常是否被吞掉

  ### 5. IO 与资源
  - [ ] 未使用 try-with-resources：流/连接是否可能泄漏
  - [ ] 大文件加载：是否一次性把大文件读入内存

  ## 输出格式
  ```
  ## 性能审查报告

  ### 高优先级
  1. [问题描述] → 位置 → 影响评估 → 优化建议

  ### 中优先级
  ...

  ### 低优先级
  ...
  ```