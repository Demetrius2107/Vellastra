name: security-check
description: 对代码进行安全审查，防止常见安全漏洞
prompt: |
  对以下代码进行安全审查，按优先级输出问题：

  ## 审查维度

  ### P0 — 高危漏洞
  - [ ] SQL 注入：是否使用了字符串拼接 SQL，而不是 PreparedStatement 或 MyBatis 参数化查询
  - [ ] XSS：用户输入是否未转义直接输出到页面
  - [ ] 水平越权：用户 A 能否操作用户 B 的数据（如通过修改 URL 中的 ID）
  - [ ] 硬编码密钥：是否在代码中硬写了密码、Token、API Key
  - [ ] 文件上传漏洞：是否校验了文件类型和大小

  ### P1 — 中危风险
  - [ ] 敏感信息泄露：日志中是否打印了密码、手机号、身份证等
  - [ ] CSRF：是否有防御措施（Token 校验或 Referer 校验）
  - [ ] 未授权访问：接口是否缺少 @RequirePermission 或角色校验
  - [ ] 输入校验不足：@Valid / @NotBlank / @NotNull 是否缺失
  - [ ] 越权数据查询：查询是否加了用户 ID 过滤条件

  ### P2 — 低危建议
  - [ ] HTTPS 是否强制
  - [ ] 密码是否使用 BCrypt 加密存储
  - [ ] Token 是否设置了合理过期时间
  - [ ] 文件下载是否做了路径穿越防护

  ## 输出格式
  ```
  ## 安全审查报告

  ### P0 - 必须修复
  1. [问题描述] → 行号 → 修复建议

  ### P1 - 建议修复
  ...

  ### P2 - 值得关注
  ...
  ```