name: comment-convention
description: 项目注释规范和 Javadoc 模板
prompt: |
  按以下规范为代码添加注释，确保可读性和一致性。

  ## 1. 类级注释

  所有 public 类必须有 Javadoc，包含类说明、作者、版本、日期。

  ```java
  /**
   * <h3>{类名}</h3>
   *
   * <p>{一句话说明这个类的职责}</p>
   *
   * <p><b>使用场景：</b>
   * <ul>
   *   <li>{场景1}</li>
   *   <li>{场景2}</li>
   * </ul>
   * </p>
   *
   * @author wanqiu
   * @version 1.1
   * @since 2026-07-18
   */
  ```

  ## 2. 方法级注释

  public 方法必须加 Javadoc，包含 @param / @return / @throws。

  ```java
  /**
   * {一句话说明方法功能}
   *
   * @param {参数名} {参数说明}
   * @return {返回值说明，如果没有返回数据写 void}
   * @throws {异常类} {什么情况下抛出此异常}
   */
  ```

  ## 3. 字段注释

  所有字段加行内注释或块注释。

  ```java
  /** 主键ID */
  private Long id;

  /** 用户名 */
  private String username;
  ```

  ## 4. 枚举注释

  ```java
  /**
   * <h3>状态枚举</h3>
   * <p>{枚举说明}</p>
   */
  public enum StatusEnum {
      /** 正常 */
      ENABLED(1),
      /** 禁用 */
      DISABLED(0);
  }
  ```

  ## 5. 避免的注释

  - ❌ 不要写"下面这个方法"、"这是"等废话注释
  - ❌ 不要写"// 设置名称"这种明显不如代码自解释的注释
  - ❌ 不要在被注释的代码中留 TODO 不处理
  - ✅ 应写"为什么这么做"而非"做了什么"

  ## 6. 日志规范

  - debug: 关键变量值、方法入参出参（生产环境默认关闭）
  - warn: 可预期的业务异常、参数校验失败
  - error: 未预期的系统异常，打印完整堆栈
  - 不要打印敏感信息（密码、Token）
  - 不要写 System.out.println