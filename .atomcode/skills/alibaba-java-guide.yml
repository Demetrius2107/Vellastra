name: alibaba-java-guide
description: 遵循《阿里巴巴 Java 开发手册》规范编写和审查代码
prompt: |
  编写或审查 Java 代码时，严格遵循《阿里巴巴 Java 开发手册》以下核心规约：

  ## 一、编程规约

  ### 命名风格
  - 【强制】类名使用 UpperCamelCase，方法名/参数名/变量名使用 lowerCamelCase
  - 【强制】常量命名全部大写，单词间用下划线隔开
  - 【强制】抽象类命名使用 Abstract 或 Base 开头；异常类命名使用 Exception 结尾
  - 【强制】POJO 类中布尔类型的变量，都不要加 is 前缀，否则部分框架解析会引起序列化错误

  ### 常量定义
  - 【强制】不允许任何魔法值（即未经定义的常量）直接出现在代码中
  - 【推荐】常量的复用层次有五层：跨应用共享常量、应用内共享常量、子工程内共享常量、包内共享常量、类内共享常量

  ### OOP 规约
  - 【强制】避免通过一个类的对象引用访问此类的静态变量或静态方法，无谓增加编译器解析成本，直接用类名访问
  - 【强制】所有的覆写方法，必须加 @Override 注解
  - 【强制】Object 的 equals 方法容易抛空指针异常，应使用常量或确定有值的对象来调用 equals
  - 【推荐】setter 方法中，参数名称与类成员变量名称一致，this.成员名 = 参数名

  ### 并发处理
  - 【强制】线程资源必须通过线程池提供，不允许在应用中自行显式创建线程
  - 【强制】SimpleDateFormat 是线程不安全的类，一般不要定义为 static 变量
  - 【强制】高并发时，同步调用应该考量锁的性能损耗

  ### 控制语句
  - 【强制】在 if/else/for/while/do 语句中必须使用大括号
  - 【推荐】推荐尽量少用 else，if-else 的方式可以改写成卫语句

  ## 二、异常日志

  - 【强制】Java 类库中定义的 RuntimeException 可以通过预先检查进行规避，不应该通过 catch 来处理
  - 【强制】异常不要用来做流程控制，条件控制
  - 【推荐】方法的返回值可以为 null，不强制返回空集合，但必须添加注释充分说明什么情况下会返回 null
  - 【强制】生产环境禁止使用 System.out 或 System.err 打印日志，必须使用 SLF4J

  ## 三、MySQL 数据库

  - 【强制】表达是与否概念的字段，必须使用 is_xxx 的方式命名，数据类型是 unsigned tinyint
  - 【强制】表名、字段名必须使用小写字母或数字，禁止出现数字开头
  - 【强制】唯一索引名为 uk_字段名；普通索引名则为 idx_字段名
  - 【强制】业务上具有唯一特性的字段，即使是多个字段的组合，也必须建成唯一索引
  - 【强制】不要使用 count(列名) 或 count(常量) 来替代 count(*)
  - 【强制】页面搜索严禁左模糊或者全模糊，如果需要请走搜索引擎来解决

  ## 四、工程结构

  - 【推荐】图中默认上层依赖于下层，箭头关系表示可直接依赖
  - 【推荐】开放接口层 → Web 层 → Service 层 → Manager 层 → DAO 层