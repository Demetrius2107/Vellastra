name: Docker Build

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build'
        required: true
        default: 'vellastra-article'

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package
        run: mvn package -DskipTests -q -pl ${{ github.event.inputs.service || 'vellastra-article' }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ github.event.inputs.service || 'article' }}:latest
            ghcr.io/${{ github.repository }}/${{ github.event.inputs.service || 'article' }}:${{ github.ref_name }}