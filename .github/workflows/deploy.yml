name: Deploy

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (auth/user/article/category/comment/gateway)'
        required: true
        default: 'article'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package
        run: mvn package -DskipTests -q

      - name: Deploy via SCP
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "vellastra-*/target/*.jar"
          target: "/opt/vellastra/"
          strip_components: 2

      - name: Restart Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/vellastra
            systemctl restart vellastra-${{ github.event.inputs.service || 'article' }}