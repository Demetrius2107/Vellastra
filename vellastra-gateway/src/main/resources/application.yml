server:
  port: 8080

spring:
  application:
    name: vellastra-gateway
  cloud:
    gateway:
      routes:
        - id: vellastra-auth
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        - id: vellastra-user
          uri: http://localhost:8082
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
        - id: vellastra-article
          uri: http://localhost:8083
          predicates:
            - Path=/api/article/**
          filters:
            - StripPrefix=2
        - id: vellastra-category
          uri: http://localhost:8084
          predicates:
            - Path=/api/category/**
          filters:
            - StripPrefix=2
        - id: vellastra-comment
          uri: http://localhost:8085
          predicates:
            - Path=/api/comment/**
          filters:
            - StripPrefix=2

logging:
  level:
    com.demetrius.vellastra.gateway: debug

gateway:
  white-list: /auth/login,/auth/register,/actuator/**,/doc.html,/v3/api-docs,/swagger-ui/**,/webjars/**
